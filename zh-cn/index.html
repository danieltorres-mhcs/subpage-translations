{type:"text",text:"您好、我是林培钦。",color:"#DBBDA4"},
{type:"text",text:"我来自菲律宾帕拉尼亚克，但出于显而易见的原因，我不会透露更多我的住址，我当然没那么傻。我是美菲混血儿🇺🇸🇵🇭，我爸爸来自内华达州，妈妈来自帕赛。我的编程水平一般，但也做过一些GitHub项目。我的数学还不错，但算不上顶尖。不过，我目前还是数学竞赛队的成员。我的生日是2014年12月9日。下面的嵌入内容显示了我的当前年龄以及距离生日还有多少天，快来看看吧！我去过很多地方旅行，包括国内和国际旅行（我通常出国旅行）。例如，韩国、日本、长滩岛、关岛等等。我有两个姐妹，索菲亚和斯特拉。我现在就读于马卡蒂希望基督学校，之前在吉甸学院就读，直到五年级才转学到马卡蒂希望基督学校。我喜欢亚洲菜、美国菜和意大利菜。我喜欢听VOCALOID和UTAU的歌，还有Kevin Macleod的歌、老美国流行歌曲等等。我的爱好通常是做手工、画画、做一些随机的比较，或者玩笔。我最喜欢的动物是水獭🦦，因为它们又小又可爱，而且总是表现得特别萌。你看它们！真是太可爱了！我最喜欢的科目是技术与生活技能（TLE）和机器人学；TLE是因为理论课很有趣，机器人学是因为它符合我的兴趣。",color:"#E3D3CA"},
{type:"text",text:"我的目标☆",color:"#E6CCAC"},
{type:"text",text:"我计划在数学奥林匹克竞赛中获得三枚金牌，中文和英文都取得最高荣誉，菲律宾语水平也要有所提高，并且能够顺利毕业，享受悠闲的高中生活。简而言之，我希望自己能够拥有足够的天赋，顺利度过小学最后一年——因为我知道高中生活不再像以前那样轻松愉快——并在此过程中取得一些值得尊敬的成就。",color:"#EDBF87"},

document.body.style.background = SETTINGS.background;
if (SETTINGS.disclaimer.enabled) {

    const overlay = document.createElement("div");

    overlay.style.cssText = `
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.35);
        backdrop-filter:blur(10px);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:99999;
    `;

    overlay.innerHTML = `
        <div style="
            background:white;
            max-width:450px;
            width:90%;
            padding:28px;
            border-radius:18px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        ">
            <h2 style="margin-top:0;color:${SETTINGS.disclaimer.titleColor}">
                ${SETTINGS.disclaimer.title}
            </h2>

            <p style="margin:18px 0">
                ${SETTINGS.disclaimer.description}
            </p>

            <button id="discOK"
                style="
                    border:none;
                    color:white;
                    background:${SETTINGS.disclaimer.buttonColor};
                    padding:12px 28px;
                    border-radius:10px;
                    cursor:pointer;
                    font-size:16px;

}
const app=document.getElementById("app");
CONTENT.forEach(item=>{
 const d=document.createElement("div"); d.className="section";
 if(item.type==="header"){let h=document.createElement("h1");h.textContent=item.text;h.style.color=item.color;d.appendChild(h);}
 if(item.type==="text"){let p=document.createElement("p");p.textContent=item.text;p.style.color=item.color;d.appendChild(p);}
 if(item.type==="image"){let i=document.createElement("img");i.src=item.src;d.appendChild(i);if(item.caption){let c=document.createElement("p");c.textContent=item.caption;c.style.color=item.color;d.appendChild(c);}}
 if(item.type==="embed"){d.innerHTML=item.html;}
 if(item.type==="slideshow"){
   let im=document.createElement("img");im.className="slide";let idx=0;
   im.src=item.images[0];d.appendChild(im);
   setInterval(()=>{idx=(idx+1)%item.images.length;im.src=item.images[idx];},4000);
 }
 app.appendChild(d);
});
function updateBirthday(){

    const box=document.querySelector(".birthday-box");
    if(!box) return;

    const today=new Date();

    let target=new Date(today.getFullYear(),11,9);

    if(today>target){
        target=new Date(today.getFullYear()+1,11,9);
    }

    const days=Math.ceil(
        (target-today)/(1000*60*60*24)
    );

    const age=today.getFullYear()-2014-
    (today < new Date(today.getFullYear(),11,9) ? 1:0);

    box.querySelector(".countdown").textContent=days+"天";
    box.querySelector(".age").textContent="年龄："+age+"岁";
    box.querySelector(".date").textContent=
        today.toLocaleDateString("zh-CN");
}

updateBirthday();
setInterval(updateBirthday,60000);
