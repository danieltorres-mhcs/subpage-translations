{type:"header",text:"Hallo, ik ben Daniel.",color:"#DBBDA4"},
{type:"text",text:"Hallo, ik ben Daniel Sebastian Torres. Mijn Chinese naam is 林培钦 (Lin Pei Qin). Ik kom uit Parañaque, Filipijnen, maar ik zal je niet meer over mijn adres vertellen – om voor de hand liggende redenen, zo dom ben ik natuurlijk niet. Ik ben half Amerikaans en half Filipijns 🇺🇸🇵🇭, mijn vader komt uit Nevada en mijn moeder uit Pasay. Ik ben niet de beste in programmeren, maar ik heb wel een paar Github-projecten gemaakt. Ik ben goed in wiskunde, maar niet geweldig. Ik zit nog steeds in het wiskundeprogramma van de universiteit. Mijn verjaardag is op 9 december 2014. De onderstaande afbeelding laat mijn huidige leeftijd zien en hoeveel dagen het nog duurt tot mijn verjaardag, kijk maar! Ik heb al veel gereisd, zowel in binnen- als buitenland (ik reis meestal internationaal). Bijvoorbeeld naar Korea, Japan, Boracay, Guam, enzovoort. Ik heb twee zussen, Sofia en Stella. Ik zit nu op Makati Hope Christian School, maar daarvoor zat ik op Gideon Academy tot en met groep 5, toen ben ik overgestapt naar MHCS. Ik hou van Aziatisch, Amerikaans en Italiaans eten. Ik luister graag naar VOCALOID- en UTAU-nummers, en naar liedjes van Kevin Macleod, oude Amerikaanse popliedjes en dat soort muziek. Mijn hobby's zijn meestal knutselen, tekenen, willekeurige vergelijkingen maken of met pennen spelen. Mijn favoriete dier is de otter 🦦 omdat ze zo klein en schattig zijn en zich altijd gedragen als het schattigste dier dat er is. Kijk ze nou eens! Zo lief! Mijn favoriete vakken zijn TLE en robotica; TLE omdat leraar Theo leuk is en robotica omdat het aansluit bij mijn interesses.",color:"#E3D3CA"},
{type:"text",text:"Mijn doelen☆",color:"#E6CCAC"},
{type:"text",text:"Ik ben van plan drie gouden medailles te winnen bij de wiskundeolympiades, ik wil de hoogste onderscheidingen halen voor zowel Chinees als Engels, ik wil mijn Filipijns verbeteren en ik wil in alle rust en met veel plezier afstuderen. Kortom, ik hoop dat ik genoeg talent heb om het laatste jaar van de basisschool te overleven, een jaar dat ik moet koesteren omdat ik weet dat de middelbare school niet meer alleen maar leuk en gezellig zal zijn; en dat ik onderweg ook nog eens eervolle dingen zal bereiken.",color:"#EDBF87"},

CONTENT.forEach(item=>{
 const d=document.createElement("div"); d.className="section";

function updateBirthday() {
    const box = document.querySelector(".birthday-box");
    if (!box) return;

    const today = new Date();

    // Birthday: 9 December
    let target = new Date(today.getFullYear(), 11, 9);

    if (today > target) {
        target = new Date(today.getFullYear() + 1, 11, 9);
    }

    const days = Math.ceil(
        (target - today) / (1000 * 60 * 60 * 24)
    );

    const age = today.getFullYear() - 2014 -
        (today < new Date(today.getFullYear(), 11, 9) ? 1 : 0);

    box.querySelector(".countdown").textContent = `${days} da.`;
    box.querySelector(".age").textContent = `Leeftijd: ${age} jaar`;
    box.querySelector(".date").textContent =
        today.toLocaleDateString("nl-NL");
}

updateBirthday();
setInterval(updateBirthday, 60000);
